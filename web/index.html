<script>
/* u-list-item 전역 키보드 접근성: Enter/Space 로 onclick 트리거 */
document.addEventListener('keydown', (e) => {
  if ((e.key === 'Enter' || e.key === ' ') && document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('u-list-item')) {
    e.preventDefault();
    document.activeElement.click();
  }
});

/* u-list-item 자동 tabindex + role */
new MutationObserver(() => {
  document.querySelectorAll('.u-list-item[onclick]:not([tabindex])').forEach(el => {
    el.setAttribute('tabindex', '0');
    el.setAttribute('role', 'button');
  });
}).observe(document.body, { childList: true, subtree: true });

const BrowserNotify = {
  _perm: 'default',
  init() {
    if (!('Notification' in window)) return;
    this._perm = Notification.permission;
    if (this._perm === 'default') {
      setTimeout(() => { Notification.requestPermission().then(p => { this._perm = p; }); }, 5000);
    }
  },
  show(title, body, opts) {
    if (!('Notification' in window) || this._perm !== 'granted') return;
    try {
      const n = new Notification(title, Object.assign({ body, icon: '/favicon.ico', silent: false }, opts || {}));
      n.onclick = () => { window.focus(); n.close(); };
      setTimeout(() => n.close(), 8000);
    } catch(e) {}
  }
};
BrowserNotify.init();

App.init();
</script>
